<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Library Management Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="login-screen">
    <div class="login-container">
      <div class="login-hero">
        <div class="brand-lockup">
          <div class="brand-logo-wrap">
            <img class="brand-logo" src="image.png" alt="Library logo" />
          </div>
          <div>
            <p class="eyebrow">Library Portal</p>
          </div>
        </div>
        <p class="eyebrow">Library Management System</p>
        <h1>Manage students, track fees, and monitor profits</h1>
        <div class="hero-chips">
          <span class="hero-chip">📚 Student Records</span>
          <span class="hero-chip">💳 Fee Tracking</span>
          <span class="hero-chip">📊 Monthly Profit</span>
        </div>
      </div>

      <form id="loginForm" class="login-form">
        <div id="appMessage" class="app-message is-hidden" role="status" aria-live="polite"></div>
        
        <div class="form-header">
          <h2>Sign In</h2>
          <p>Access your library portal</p>
        </div>

        <label class="input-group">
          <span>Email</span>
          <input id="loginEmail" name="loginEmail" type="email" placeholder="admin@library.com" required />
        </label>

        <label class="input-group">
          <span>Password</span>
          <input id="loginPassword" name="loginPassword" type="password" placeholder="Enter password" required />
        </label>

        <button class="primary-btn" id="loginButton" type="submit">Sign in</button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
